services:
  - type: web
    name: fornecedor-flow
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: PAGARME_PUBLIC_KEY
        sync: false
      - key: PAGARME_SECRET_KEY
        sync: false
      - key: BRAPI_API_KEY
        sync: false
      - key: HG_BRASIL_API_KEY
        sync: false
